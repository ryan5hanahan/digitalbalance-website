<svg xmlns="http://www.w3.org/2000/svg" width="135" height="40" viewBox="0 0 135 40">
  <rect width="135" height="40" rx="6" fill="#000"/>
  <!-- Google Play icon: 4-color triangle (right-pointing play button) -->
  <!-- Triangle vertices: left-top (8,8), left-bottom (8,32), right-tip (24,20) -->
  <!-- Center point: (14,20) splits into 4 colored segments -->
  <polygon points="8,8 14,20 8,20"  fill="#4285f4"/>
  <polygon points="8,8 24,20 14,20" fill="#ea4335"/>
  <polygon points="8,20 14,20 8,32" fill="#fbbc04"/>
  <polygon points="14,20 24,20 8,32" fill="#34a853"/>
  <text font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif" fill="#fff">
    <tspan x="34" y="17" font-size="9.5" letter-spacing="0.5">GET IT ON</tspan>
    <tspan x="34" y="30" font-size="15" font-weight="600">Google Play</tspan>
  </text>
</svg>
